<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Secret scanning workflow refactor</title>
  <desc id="desc">The tools-configs repository stops owning duplicated scan steps and calls the reusable secret-scanning workflow from bajor/github-workflows.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155" />
    </marker>
    <style>
      .canvas { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .repo { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .shared { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
      .removed { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 8; }
      .label { fill: #0f172a; font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .text { fill: #334155; font-family: Arial, sans-serif; font-size: 16px; }
      .small { fill: #475569; font-family: Arial, sans-serif; font-size: 14px; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .muted { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
    </style>
  </defs>

  <rect class="canvas" x="0" y="0" width="960" height="520" />
  <text class="label" x="40" y="48">Secret scanning workflow refactor</text>
  <text class="text" x="40" y="78">tools-configs now delegates scan logic to the shared workflow repository.</text>

  <rect class="panel" x="40" y="120" width="400" height="330" />
  <text class="label" x="70" y="158">Before</text>
  <rect class="repo" x="70" y="185" width="340" height="70" />
  <text class="text" x="94" y="216">bajor/tools-configs</text>
  <text class="small" x="94" y="240">.github/workflows/secret-scanning.yml</text>
  <rect class="removed" x="100" y="300" width="280" height="90" />
  <text class="text" x="126" y="335">Duplicated scan jobs</text>
  <text class="small" x="126" y="360">Gitleaks, TruffleHog, PII, artifacts, config checks</text>
  <line class="muted" x1="240" y1="255" x2="240" y2="300" />

  <rect class="panel" x="520" y="120" width="400" height="330" />
  <text class="label" x="550" y="158">After</text>
  <rect class="repo" x="550" y="185" width="340" height="70" />
  <text class="text" x="574" y="216">bajor/tools-configs</text>
  <text class="small" x="574" y="240">caller workflow keeps push and PR triggers</text>
  <rect class="shared" x="550" y="320" width="340" height="82" />
  <text class="text" x="574" y="352">bajor/github-workflows</text>
  <text class="small" x="574" y="376">.github/workflows/secret-scanning.yml@main</text>
  <path class="arrow" d="M720 255 L720 315" />

  <path class="arrow" d="M440 285 C475 285, 485 285, 520 285" />
  <text class="small" x="456" y="270">centralize ownership</text>
</svg>
